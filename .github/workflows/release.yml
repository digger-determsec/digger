name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  # ── Full Test Suite ────────────────────────────────────────────────
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

      - name: Benchmark
        run: cargo run --release --bin digger -- benchmark

  # ── GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build binaries
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin digger --bin digger-api
      - run: cargo build --release -p digger-cli

      - name: Package binaries
        run: |
          mkdir -p release
          cp target/release/digger.exe release/ 2>/dev/null || cp target/release/digger release/
          cp target/release/digger-api.exe release/ 2>/dev/null || cp target/release/digger-api release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/digger*
          draft: false
          prerelease: false
