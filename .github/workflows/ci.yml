name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * *"  # nightly full matrix

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  # ── Rust Build & Test (nextest, parallel) ────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Test (nextest)
        run: cargo nextest run --workspace

      - name: Doctests
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --workspace --doc

      - name: Benchmark
        if: github.event_name != 'pull_request'
        run: cargo run --release --bin digger -- benchmark
        continue-on-error: true

  # ── Linting ──────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format
        run: cargo fmt --all -- --check

  # ── API Integration Tests ────────────────────────────────────
  api-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run API tests
        run: cargo test -p digger-api --lib
      - name: Run platform tests
        run: cargo test -p digger-platform

  # ── Eval Gate (FP + recall enforcement) ──────────────────────
  eval-gate:
    name: Eval Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Eval gate unit tests
        run: cargo test -p digger-benchmark --test gate_bites --test gate_e2e

      - name: Build CLI
        run: cargo build -p digger-cli

      - name: digger validate (production gate path)
        run: cargo run --bin digger -- validate

  # ── Security Audit ──────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check if Cargo.lock changed (PR only)
        id: filter
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only origin/main...HEAD | grep -qE 'Cargo\.(lock|toml)|.*/Cargo\.toml'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install cargo-audit
        if: github.event_name != 'pull_request' || steps.filter.outputs.changed == 'true'
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        if: github.event_name != 'pull_request' || steps.filter.outputs.changed == 'true'
        run: cargo audit --deny warnings --ignore RUSTSEC-2025-0134 --ignore RUSTSEC-2026-0192
