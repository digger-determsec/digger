[package]
name = "digger-txwatch"
version.workspace = true
edition.workspace = true

[features]
capture = ["tokio/net", "tokio/io-util"]
production = ["tokio/net", "reqwest"]

[dependencies]
digger-evidence = { path = "../digger-evidence" }
digger-runtime = { path = "../digger-runtime" }
digger-egress = { path = "../digger-egress" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
uuid = { version = "1", features = ["v4"] }
async-trait = "0.1"
tokio = { version = "1", features = ["rt-multi-thread"] }
reqwest = { version = "0.11", features = ["json"], optional = true }
thiserror = { workspace = true }
